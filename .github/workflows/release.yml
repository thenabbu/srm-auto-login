name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate semantic version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "manifest.json version must use MAJOR.MINOR.PATCH"
            exit 1
          fi
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag v$TAG does not match manifest version $VERSION"
            exit 1
          fi

      - name: Package extension
        run: zip -r "srm-auto-login-${GITHUB_REF_NAME}.zip" manifest.json popup.html popup.js content.js icons/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: srm-auto-login-${{ github.ref_name }}.zip
          generate_release_notes: false
