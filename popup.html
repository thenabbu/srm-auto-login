<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=300, initial-scale=1.0" />
  <title>SRM Auto Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <h1>SRM Auto Login</h1>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme" title="Switch theme">
        <span class="material-symbols-rounded" id="themeIcon" aria-hidden="true">light_mode</span>
      </button>
      <span id="versionDisplay" class="version-display"></span>
      <span id="accountsStatus" class="accounts-status" style="display:none;"></span>
    </div>
  </div>

  <div id="updateBanner" class="update-banner" style="display:none;"></div>

  <form id="loginForm" autocomplete="off" novalidate>

    <div class="field">
      <label for="srmIdInput">SRM ID</label>
      <div class="srm-id-wrap">
        <input
          type="text"
          id="srmIdInput"
          placeholder="ab1234"
          inputmode="latin"
          autocomplete="username"
          spellcheck="false"
          maxlength="6"
          pattern="[A-Za-z]{2}[0-9]{4}"
          required
        />
        <span class="srm-domain">@srmist.edu.in</span>
      </div>
    </div>

    <div class="field">
      <label for="pwInput">Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="pwInput"
          class="has-toggle"
          autocomplete="new-password"
        />
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
          <span class="material-symbols-rounded" aria-hidden="true">visibility</span>
        </button>
      </div>
    </div>

    <div class="btn-row">
      <button class="primary" id="saveBtn" type="submit">Save account</button>
      <button class="secondary" id="clearBtn" type="button">Clear all</button>
    </div>

    <div class="status" id="statusMsg" role="status" aria-live="polite"></div>

    <div class="divider"></div>

    <div class="account-list" id="accountList" aria-label="Saved accounts"></div>

  </form>

  <div class="divider"></div>

  <div class="log-section" id="logSection" style="display:none;">
    <button class="log-toggle" id="logToggle" type="button">
      <span class="material-symbols-rounded" aria-hidden="true">history</span>
      <span id="logToggleLabel">Activity log</span>
      <span class="material-symbols-rounded log-chevron" id="logChevron" aria-hidden="true">expand_more</span>
    </button>
    <div class="log-body" id="logBody" style="display:none;"></div>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <div class="footer-icon">
      <span class="material-symbols-rounded" aria-hidden="true" style="font-size:10px; line-height:1; display:block; color:#747474;">lock</span>
    </div>
    <p>All data is stored locally</p>
  </div>

  <script src="shared/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
